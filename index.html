<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcOne Wallet Connect</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:420px;
background:#0f172a;
border:1px solid #1e293b;
padding:30px;
border-radius:20px;
text-align:center;
}

.logo{
font-size:40px;
margin-bottom:10px;
}

h1{
margin-bottom:10px;
}

p{
color:#94a3b8;
margin-bottom:20px;
word-break:break-all;
}

select{
width:100%;
padding:12px;
background:#111827;
border:1px solid #374151;
color:white;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

.connect{
background:#2563eb;
color:white;
}

.switch{
background:#16a34a;
color:white;
}

.status{
margin-top:15px;
padding:10px;
background:#111827;
border-radius:10px;
font-size:14px;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">⚡</div>

<h1>ArcOne</h1>

<p id="walletAddress">
Wallet Not Connected
</p>

<button
class="connect"
id="connectBtn">
Connect Wallet
</button>

<br><br>

<select id="networkSelect">
<option value="ARC">Arc Testnet</option>
<option value="SEPOLIA">Sepolia Testnet</option>
<option value="ARBITRUM">Arbitrum Sepolia</option>
</select>

<button
class="switch"
onclick="changeNetwork()">
Switch Network
</button>

<div class="status" id="networkStatus">
No Network Detected
</div>

</div>

<script>

let provider;
let signer;

const NETWORKS = {

ARC:{
chainId:"0x4ceaf2",
chainName:"Arc Testnet",
nativeCurrency:{
name:"USDC",
symbol:"USDC",
decimals:6
},
rpcUrls:[
"https://rpc.testnet.arc.network"
],
blockExplorerUrls:[
"https://testnet.arcscan.app"
]
},

SEPOLIA:{
chainId:"0xaa36a7",
chainName:"Sepolia",
nativeCurrency:{
name:"ETH",
symbol:"ETH",
decimals:18
},
rpcUrls:[
"https://rpc.sepolia.org"
],
blockExplorerUrls:[
"https://sepolia.etherscan.io"
]
},

ARBITRUM:{
chainId:"0x66eee",
chainName:"Arbitrum Sepolia",
nativeCurrency:{
name:"ETH",
symbol:"ETH",
decimals:18
},
rpcUrls:[
"https://sepolia-rollup.arbitrum.io/rpc"
],
blockExplorerUrls:[
"https://sepolia.arbiscan.io"
]
}

};

async function connectWallet(){

try{

if(!window.ethereum){
alert("Please install MetaMask");
return;
}

provider =
new ethers.BrowserProvider(
window.ethereum
);

await provider.send(
"eth_requestAccounts",
[]
);

signer =
await provider.getSigner();

const address =
await signer.getAddress();

document.getElementById(
"walletAddress"
).innerHTML =
address;

document.getElementById(
"connectBtn"
).innerHTML =
"Connected ✅";

getCurrentNetwork();

}catch(error){
console.error(error);
}

}

async function changeNetwork(){

const selected =
document.getElementById(
"networkSelect"
).value;

const network =
NETWORKS[selected];

try{

await window.ethereum.request({
method:"wallet_switchEthereumChain",
params:[
{
chainId:network.chainId
}
]
});

}catch(error){

if(error.code===4902){

await window.ethereum.request({
method:"wallet_addEthereumChain",
params:[network]
});

}

}

getCurrentNetwork();

}

async function getCurrentNetwork(){

if(!window.ethereum) return;

const provider =
new ethers.BrowserProvider(
window.ethereum
);

const network =
await provider.getNetwork();

document.getElementById(
"networkStatus"
).innerHTML =
"Chain ID: " +
network.chainId;

}

document
.getElementById("connectBtn")
.addEventListener(
"click",
connectWallet
);

if(window.ethereum){

window.ethereum.on(
"accountsChanged",
(accounts)=>{

if(accounts.length){

document.getElementById(
"walletAddress"
).innerHTML =
accounts[0];

}

}
);

window.ethereum.on(
"chainChanged",
()=>{
location.reload();
}
);

}

</script>

</body>
</html>
