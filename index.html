<!-- Token Transfer Card -->

<div class="card">

  <h2>💸 Token Transfer</h2>

  <label>Select Token</label>

  <select id="tokenSelect">
      <option value="USDC">USDC</option>
      <option value="EURC">EURC</option>
      <option value="cirBTC">cirBTC</option>
  </select>

  <label>Recipient Address</label>

  <input
      type="text"
      id="recipientAddress"
      placeholder="0x..."
  >

  <label>Amount</label>

  <input
      type="number"
      id="transferAmount"
      placeholder="0.00"
  >

  <button
      id="sendBtn"
      onclick="sendToken()"
  >
      Send Token
  </button>

  <div id="transferStatus"></div>

</div>

<style>

.card{
background:#0f172a;
border:1px solid #1e293b;
padding:20px;
border-radius:16px;
margin-top:20px;
}

.card h2{
margin-bottom:15px;
}

input,
select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #334155;
background:#111827;
color:white;
}

#sendBtn{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

#transferStatus{
margin-top:15px;
padding:10px;
background:#111827;
border-radius:10px;
color:#22c55e;
}

</style>

<script>

const TOKENS = {

USDC:{
address:"0x3600000000000000000000000000000000000000",
decimals:6
},

EURC:{
address:"0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a",
decimals:6
},

cirBTC:{
address:"",
decimals:8
}

};

async function sendToken(){

const token =
document.getElementById(
"tokenSelect"
).value;

const recipient =
document.getElementById(
"recipientAddress"
).value;

const amount =
document.getElementById(
"transferAmount"
).value;

if(!recipient){

alert(
"Enter recipient address"
);

return;

}

if(!amount){

alert(
"Enter amount"
);

return;

}

document.getElementById(
"transferStatus"
).innerHTML =
`Preparing ${amount} ${token} transfer...`;

console.log({
token,
recipient,
amount
});

/*
Real ERC20 Transfer
requires:

ethers.js
wallet connect
signer
contract.transfer()

*/

}

</script>

.
